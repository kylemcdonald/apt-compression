<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>APT Compression Demo</title>
  </head>
  <body>
    <div id="app" class="pane-collapsed">
      <aside id="controlPanel" class="panel">
        <button id="paneToggle" class="pane-toggle" type="button" aria-expanded="false" aria-label="Show controls" title="Show controls">&gt;</button>
        <div id="panelContent" class="panel-content" inert aria-hidden="true">
          <div class="panel-title">APT Compression Demo</div>

          <label>
            Dataset
            <select id="datasetSelect"></select>
          </label>

          <label class="toggle-row">
            <input id="compressedToggle" type="checkbox" checked />
            <span>Load compressed</span>
          </label>

          <div class="field-row">
            <label>
              <span class="label-row">
                <span>Point size</span>
                <span id="pointSizeValue">0.50</span>
              </span>
              <input id="pointSizeInput" type="range" min="0.5" max="10" step="0.01" value="0.5" />
            </label>
            <label>
              <span class="label-row">
                <span>Opacity</span>
                <span id="opacityValue">10%</span>
              </span>
              <input id="opacityInput" type="range" min="0.02" max="1" step="0.01" value="0.10" />
            </label>
          </div>

          <div class="field-row">
            <label>
              Render budget
              <input id="budgetInput" type="number" min="1000" max="16000000" step="1000" value="1000000" />
            </label>
            <span></span>
          </div>

          <input id="budgetRange" type="range" min="10000" max="16000000" step="10000" value="1000000" />

          <div id="statusLine" class="status"></div>

          <button id="metricsToggle" class="metrics-title" type="button" aria-expanded="false">METRICS</button>
          <dl id="metricsPanel" class="metrics" hidden></dl>
        </div>
      </aside>

      <main id="viewer">
        <div id="canvasHost"></div>
        <div id="budgetNotice" class="notice"></div>
        <section id="spectrumPanel">
          <div class="spectrum-heading">
            <div class="spectrum-title-group">
              <span>Mass spectrum</span>
              <select id="spectrumScaleSelect" aria-label="Spectrum scale">
                <option value="log">Log counts</option>
                <option value="linear">Linear counts</option>
              </select>
              <div class="spectrum-range-inputs">
                <label>
                  Min
                  <input id="massMinInput" type="number" step="0.01" />
                </label>
                <label>
                  Max
                  <input id="massMaxInput" type="number" step="0.01" />
                </label>
                <label id="binSliderWrap" class="bin-slider">
                  CDF bin
                  <input id="binSliderInput" type="range" min="1" max="32" step="1" value="1" />
                  <span id="binSliderLabel">01 / 32</span>
                </label>
              </div>
            </div>
            <span id="spectrumHint"></span>
          </div>
          <canvas id="spectrumCanvas"></canvas>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
